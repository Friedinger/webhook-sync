name: Build and Test Action

on: [push]

jobs:
  build:
    name: Build Action
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Npm setup
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build action
        run: npm run build

      - name: Upload action artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: action-dist
          path: dist

  test:
    name: Test Action
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: action.yml

      - name: Download action artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: action-dist
          path: dist

      - name: Delete existing webhook
        env:
          GH_TOKEN: ${{ secrets.WEBHOOK_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          WEBHOOK_URL: https://example.com/webhook
        run: |
          set -euo pipefail

          hook_ids=$(gh api "repos/$REPOSITORY/hooks" --paginate | jq -r -s --arg url "$WEBHOOK_URL" '[.[] | .[] | select(.config.url == $url) | .id] | .[]')

          if [ -z "$hook_ids" ]; then
            echo "No existing webhook found for $WEBHOOK_URL"
            exit 0
          fi

          for hook_id in $hook_ids; do
            gh api --method DELETE "repos/$REPOSITORY/hooks/$hook_id"
            echo "Deleted webhook $hook_id"
          done

      - name: Run action
        uses: ./
        with:
          github-token: ${{ secrets.WEBHOOK_TOKEN }}
          webhook-url: "https://example.com/webhook"
          events: "push,pull_request"

      - name: Verify webhook was recreated
        env:
          GH_TOKEN: ${{ secrets.WEBHOOK_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          WEBHOOK_URL: https://example.com/webhook
        run: |
          set -euo pipefail

          hooks_json=$(gh api "repos/$REPOSITORY/hooks" --paginate | jq -s --arg url "$WEBHOOK_URL" '[.[] | .[] | select(.config.url == $url)]')

          echo "Found $(printf '%s' "$hooks_json" | jq 'length') matching webhook(s) for $WEBHOOK_URL"
          printf '%s' "$hooks_json" | jq -r '.[] | "Webhook ID: \(.id), active: \(.active), content_type: \(.config.content_type), events: \(.events | join(","))"'

          printf '%s' "$hooks_json" | jq -e --arg url "$WEBHOOK_URL" '
            length == 1
            and .[0].active == true
            and .[0].config.url == $url
            and .[0].config.content_type == "json"
            and (.[0].events | index("push"))
            and (.[0].events | index("pull_request"))
          ' >/dev/null

  commit-build:
    name: Commit Action Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download action artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: action-dist
          path: dist

      - name: Check for repo changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all dist)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dist directory
        if: steps.changes.outputs.changes == 'true'
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          commit_message: "📦 Update action build [skip ci]"
          files: dist/
          fail_on_self_push: false
