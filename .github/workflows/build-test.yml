name: Build and Test Action

on: [push]

jobs:
  build:
    name: Build Action
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Npm setup
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24.14.0
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build action
        run: npm run build

      - name: Upload action artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: action-dist
          path: dist

  test:
    name: Test Action
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: action.yml

      - name: Download action artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: action-dist
          path: dist

      - name: Run action
        uses: ./
        with:
          github-token: ${{ secrets.WEBHOOK_TOKEN }}
          webhook-url: "https://example.com/webhook"
          events: "push,pull_request"

  commit-build:
    name: Commit Action Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download action artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: action-dist
          path: dist

      - name: Check for repo changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all dist)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit dist directory
        if: steps.changes.outputs.changes == 'true'
        uses: suzuki-shunsuke/commit-action@f12e2d628a4ab72dcefe7890ae07e8dbf1e201b9 # v0.1.1
        with:
          commit_message: "📦 Update action build [skip ci]"
          files: dist/
          fail_on_self_push: false
